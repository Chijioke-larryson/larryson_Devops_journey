source: README.md
project: Docker DevOps Course Notes
concept:
  containers: "Software packages that run on Linux and bundle an application with its dependencies."
  docker: "Platform for building, shipping, and running containers."
commands:
  - command: "docker images"
    description: "Lists the Docker images stored on the local machine."
    example: "docker images"
  - command: "docker ps"
    description: "Shows the containers that are currently running."
    example: "docker ps"
  - command: "docker ps -a"
    description: "Shows all containers, including stopped ones."
    example: "docker ps -a"
  - command: "docker run nginx"
    description: "Starts an nginx container from the nginx image."
    example: "docker run nginx"
  - command: "docker run -d --name my-nginx nginx"
    description: "Runs nginx in detached mode and gives the container a name."
    example: "docker run -d --name my-nginx nginx"
  - command: "docker exec -it my-nginx bash"
    description: "Opens an interactive shell inside a running container."
    example: "docker exec -it my-nginx bash"
  - command: "docker exec -it my-nginx nginx -t"
    description: "Checks the nginx configuration from inside the running container."
    example: "docker exec -it my-nginx nginx -t"
  - command: "docker stop my-nginx"
    description: "Stops a running container safely."
    example: "docker stop my-nginx"
  - command: "docker rm my-nginx"
    description: "Removes a stopped container."
    example: "docker rm my-nginx"
notes:
  - "No Docker commands are currently documented in README.md."
  - "Add commands here as the course notes grow."
  - "The --name flag is used with docker run, not docker exec."
